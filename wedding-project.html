<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Website Project | The_Helper</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,500,600,700|Roboto:400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .project-gallery {
      display: grid;
      grid-template-columns: 1fr;
      gap: 4rem;
      margin-top: 3rem;
    }
    @media (min-width: 768px) {
      .project-gallery {
        grid-template-columns: repeat(2, 1fr);
        gap: 3rem;
      }
      .gallery-item:first-child {
        grid-column: 1 / -1;
        margin-bottom: 2rem;
      }
      .gallery-item:nth-child(even) {
        margin-top: 5rem;
      }
    }
    .gallery-item {
      position: relative;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      transition: transform 0.5s ease, box-shadow 0.4s ease;
    }
    .gallery-item:hover {
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
      z-index: 10;
    }
    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s ease;
    }
    .gallery-item:hover img {
      transform: scale(1.05);
    }
    .gallery-item::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 2;
    }
    .gallery-item:hover::after {
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <nav class="navbar">
      <div class="logo">The_Helper</div>
      <ul class="nav-links">
        <!-- Link back to the main page -->
        <li><a href="index.html"><i class="fas fa-arrow-left nav-icon"></i> Back to Portfolio</a></li>
      </ul>
      <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
          <input type="checkbox" id="checkbox" />
          <div class="slider round"></div>
        </label>
      </div>
      <button class="hamburger-menu" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </nav>
  </header>

  <main>
    <!-- Project Title Section -->
    <section class="hero" style="padding-top: 8rem; padding-bottom: 2rem;">
      <div class="hero-content">
        <h1>Wedding Website Project</h1>
        <p class="intro">A showcase of the interactive design and features.</p>
      </div>
    </section>

    <!-- Project Gallery Section -->
    <section class="about">
      <div class="about-card" style="max-width: 1000px; perspective: 1500px;">
        <h3 style="text-align: center; margin-bottom: 2rem;">Project Gallery</h3>
        
        <!-- Project Images -->
        <div class="project-gallery">
          <div class="gallery-item"><img src="assets/photos/wedding.png" alt="Wedding Home Page"></div>
          <div class="gallery-item"><img src="assets/photos/wedding2.png" alt="Wedding RSVP Section"></div>
          <div class="gallery-item"><img src="assets/photos/wedding3.png" alt="Wedding Gallery"></div>
          <div class="gallery-item"><img src="assets/photos/wedding4.png" alt="Wedding Details"></div>
          <div class="gallery-item"><img src="assets/photos/wedding7.png" alt="Wedding Mobile View"></div>
        </div>

        <div style="margin-top: 3rem; text-align: center;">
          <p>This project demonstrates a fully responsive layout, custom CSS animations, and a user-friendly RSVP form.</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-content">
      <p>&copy; 2026 Sooraj Sikarwar. All rights reserved.</p>
      <div class="footer-social">
        <a href="index.html" style="color: #fff; text-decoration: underline;">Return Home</a>
      </div>
    </div>
  </footer>

  <script>
    // Theme Toggle Logic
    const themeToggle = document.getElementById('checkbox');
    const currentTheme = localStorage.getItem('theme');

    // Apply saved theme on load
    if (currentTheme === 'dark-mode') {
      document.body.classList.add('dark-mode');
      themeToggle.checked = true;
    }

    themeToggle.addEventListener('change', function() {
      if (this.checked) {
        document.body.classList.add('dark-mode');
        localStorage.setItem('theme', 'dark-mode');
      } else {
        document.body.classList.remove('dark-mode');
        localStorage.setItem('theme', 'light-mode');
      }
    });

    // Hamburger Menu Logic
    const hamburger = document.querySelector('.hamburger-menu');
    const navLinks = document.querySelector('.nav-links');

    if (hamburger && navLinks) {
      hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('active');
        hamburger.classList.toggle('active');
        // For accessibility
        const isExpanded = hamburger.getAttribute('aria-expanded') === 'true';
        hamburger.setAttribute('aria-expanded', !isExpanded);
      });
    }

    // Interactive 3D Tilt Effect
    const galleryItems = document.querySelectorAll('.gallery-item');

    galleryItems.forEach(item => {
      item.addEventListener('mouseenter', () => {
        item.style.transition = 'transform 0.1s ease-out, box-shadow 0.4s ease';
      });

      item.addEventListener('mousemove', (e) => {
        const rect = item.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        item.style.setProperty('--x', `${(x / rect.width) * 100}%`);
        item.style.setProperty('--y', `${(y / rect.height) * 100}%`);
        
        const xRotation = ((y - rect.height / 2) / rect.height) * -20;
        const yRotation = ((x - rect.width / 2) / rect.width) * 20;
        
        item.style.transform = `perspective(1000px) rotateX(${xRotation}deg) rotateY(${yRotation}deg) scale(1.05)`;
      });

      item.addEventListener('mouseleave', () => {
        item.style.transition = 'transform 0.5s ease, box-shadow 0.4s ease';
        item.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
      });
    });
  </script>
</body>
</html>
